# vim:fileencoding=utf-8:foldmethod=marker

# ==========================================================
# PÍSMO (FONTS)
# ==========================================================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 11.5

# Úprava riadkovania (100% je štandard, 115% pridá "vzdušnosť").
# Iné možnosti: číselná hodnota v pixeloch.
modify_font line_height 115%

# Ligatúry (spájanie znakov ako -> na šípku). 
# Možnosti: always, never, cursor (vypne tam, kde práve píšeš).
disable_ligatures cursor

## ==========================================================
## FARBY (FAREBNÁ PALETA Z COOLORS.CO)
## ==========================================================
## Použitie tvojich farieb: night_sky (pozadie), cream (text), bright_red (akcent)
#
## Hlavné farby
#background            background
#foreground            foreground
#selection_background  selection_background
#selection_foreground  selection_foreground
#
## Farba kurzora a textu pod ním
#cursor                cursor
#cursor_text_color     night_sky
#
## Farba URL pri prejdení myšou
#url_color             bright_red
#
## Definícia 16 farieb terminálu (ANSI)
## Čierna (pozadie a tmavošedá)
#color0  black
#color8  bright_black
#
## Červená (tmavá a svetlá z tvojej palety)
#color1  red
#color9  bright_red
#
## Zelená (nahradená tvojimi bordovými/hnedými tónmi pre konzistenciu)
#color2  dark_red
#color10 neon_red
#
## Žltá (béžové tóny)
#color3  soft_red
#color11 border_red
#
## Modrá
#color4  night_sky
#color12 brick_blue
#
## Magenta (najjasnejšia červená)
#color5  steel
#color13 graphite
#
## Cyan (šedohnedá)
#color6  rock
#color14 gravel
#
## Biela
#color7  cream
#color15 bright_white

# ==========================================================
# KURZOR (MODERNÉ FUNKCIE 0.43+)
# ==========================================================
# Tvar kurzora: block (kocka), beam (čiara), underline (podčiarkovník)
cursor_shape beam

# NOVINKA: "Cursor Trail" (animovaná stopa za kurzorom pri pohybe)
# 0 vypne, vyššie číslo = dlhšia stopa.
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# Blikanie (v sekundách). 0 vypne.
cursor_blink_interval 0

# ==========================================================
# OKNO A DIZAJN (WINDOW LAYOUT)
# ==========================================================
# Vnútorný okraj textu (padding) - dôležité pre Hyprland.
window_padding_width 12

# Priehľadnosť pozadia (0.0 až 1.0).
background_opacity 0.88

# Rozmazanie pozadia (vyžaduje podporu v Hyprland). 1 zapne, 0 vypne.
background_blur 1

# Skrytie hornej lišty okna (Hyprland si rieši okraje sám).
hide_window_decorations yes

# Čo robiť, keď okno nie je aktívne (0.0 až 1.0). 1.0 = nemení sa nič.
inactive_text_alpha 0.8

# ==========================================================
# TAB LIŠTA (TAB BAR)
# ==========================================================
# Umiestnenie kariet: top (hore) alebo bottom (dole).
tab_bar_edge top

# Štýl lišty: fade, slant, separator, powerline, custom.
tab_bar_style powerline
tab_powerline_style slanted

## Farby kariet (zladené s paletou)
#active_tab_foreground   night_sky
#active_tab_background   cursor
#active_tab_font_style   bold
#inactive_tab_foreground rock
#inactive_tab_background graphite

# ==========================================================
# MYŠ A SYSTÉM
# ==========================================================
# Skryť kurzor myši po 2 sekundách nečinnosti.
mouse_hide_wait 2.0

# Počet riadkov spätnej histórie.
scrollback_lines 10000

# Detekcia URL odkazov (áno/nie).
detect_urls yes

# Vypnutie pípnutia (Audio Bell).
enable_audio_bell no

# Wayland integrácia (kritické pre plynulosť na Fedore).
linux_display_server wayland

# Výkon: Repaint delay (nižšie číslo = vyššie FPS, 8ms je cca 120Hz).
repaint_delay 16
input_delay 2
sync_to_monitor yes

# ==========================================================
# KLÁVESOVÉ SKRATKY (KEYBINDINGS)
# ==========================================================
# Definícia hlavnej klávesy pre Kitty (ctrl+shift).
kitty_mod ctrl+shift

# Reset konfigurácie bez reštartu aplikácie.
map kitty_mod+l load_config_file

# Práca s oknami (Splits)
# map kitty_mod+enter new_window
# map kitty_mod+w close_window
# map kitty_mod+right next_window
# map kitty_mod+left previous_window

# Práca s kartami (Tabs)
map kitty_mod+t new_tab
map kitty_mod+q close_tab
map kitty_mod+right next_tab
map kitty_mod+left previous_tab

# Zoomovanie (Zmena veľkosti písma)
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# Kopírovanie a vkladanie
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

include colors.conf
