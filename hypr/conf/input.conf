# -----------------------------------------------------
# Input
# -----------------------------------------------------

input {
    #keybord layout + switch
    kb_layout = us,sk
    kb_options = grp:alt_shift_toggle
    
    kb_variant =
    kb_model =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    
    touchpad {
    natural_scroll = true
	  tap-to-click = true
	  clickfinger_behavior = true
    scroll_factor = 0.7
    }
}


# -----------------------------------------------------
# Gestures
# -----------------------------------------------------

gestures {
    gesture = 3, horizontal, workspace

}

# -----------------------------------------------------
# Device
# -----------------------------------------------------

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


