# -----------------------------------------------------
# Decoration
# -----------------------------------------------------

decoration {
    rounding = 0
    rounding_power = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 0.90
    fullscreen_opacity = 1

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true

        vibrancy = 0.0
        brightness = 0.9
    }
}


