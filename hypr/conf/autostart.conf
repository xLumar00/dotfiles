# -----------------------------------------------------
# Autostart
# -----------------------------------------------------

# -----------------------------------------------------
# Portals & Environment (Dôležité pre zdieľanie obrazovky)
# -----------------------------------------------------

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# -----------------------------------------------------
# Polkit Agent (Zobrazovanie okien pre heslo/root)
# -----------------------------------------------------

exec-once = /usr/libexec/polkit-gnome-authentication-agent-1


# -----------------------------------------------------
# UI Elementy
# -----------------------------------------------------

exec-once = waybar
exec-once = hyprpaper
exec-once = dunst


# -----------------------------------------------------
# System Tray Apps (Siet, Bluetooth, Idle)
# -----------------------------------------------------

exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = hypridle


# -----------------------------------------------------
# Apps
# -----------------------------------------------------


exec-once = [workspace special:magic silent] brave-browser

exec-once = [workspace 1 silent] spotify
exec-once = [workspace 1 silent] kitty -e cava
exec-once = [workspace 1 silent] kitty -e htop
exec-once = [workspace 1 silent] kitty -e fastfetch

exec-once = [workspace 2 silent] kitty -e nvim
exec-once = [workspace 2 silent] kitty -e yazi
